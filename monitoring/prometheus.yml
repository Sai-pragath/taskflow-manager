global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─────────────────────────────────────────
  # Prometheus self-monitoring
  # ─────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ─────────────────────────────────────────
  # Spring Boot Backend (Actuator/Micrometer)
  # ─────────────────────────────────────────
  - job_name: taskflow-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: taskflow-backend
