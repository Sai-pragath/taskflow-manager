# ===========================================
# Prod Profile — PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${POSTGRES_DB:taskdb}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===========================================
# JWT (override via environment)
# ===========================================
jwt.secret=${JWT_SECRET:TaskManagerSecretKeyForJWTAuthenticationMustBeAtLeast256BitsLong2024!}
jwt.expiration=${JWT_EXPIRATION:86400000}
