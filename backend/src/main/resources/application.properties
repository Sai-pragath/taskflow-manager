# ===========================================
# Task Manager — Application Configuration
# ===========================================

# Active profile (use 'dev' for local development with H2, 'prod' for PostgreSQL)
spring.profiles.active=dev

# Application name
spring.application.name=task-manager

# ===========================================
# JPA / Hibernate
# ===========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=TaskManagerSecretKeyForJWTAuthenticationMustBeAtLeast256BitsLong2024!
jwt.expiration=86400000

# ===========================================
# Server
# ===========================================
server.port=8080

# ===========================================
# Actuator / Prometheus Monitoring
# ===========================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# ===========================================
# CORS (for frontend on different port)
# ===========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174
